id: nostr-swarm
title: "nostr-swarm"
version: 0.1.0
release-notes: |
  * Initial release
  * Peer-to-peer Nostr relay over Hyperswarm
  * Web of Trust filtering
  * Light client mode
license: MIT
wrapper-repo: "https://github.com/sovITxyz/nostr-swarm"
upstream-repo: "https://github.com/sovITxyz/nostr-swarm"
support-site: "https://github.com/sovITxyz/nostr-swarm/issues"
marketing-site: "https://github.com/sovITxyz/nostr-swarm"
build: ["make"]
description:
  short: A fully peer-to-peer Nostr relay that syncs events over Hyperswarm.
  long: |
    nostr-swarm is a Nostr relay where every instance is a peer, not a server.
    Multiple relay nodes join a shared Hyperswarm topic, replicate their data
    over encrypted P2P connections, and Autobase linearizes all writes into a
    deterministic view. Every peer ends up with the same events regardless of
    join order. Includes Web of Trust filtering and light client support.

assets:
  license: LICENSE
  icon: icon.png
  instructions: instructions.md

main:
  type: docker
  image: main
  entrypoint: "docker_entrypoint.sh"
  args: []
  mounts:
    main: /data

hardware-requirements:
  arch:
    - x86_64
    - aarch64

health-checks:
  main:
    name: WebSocket Server
    success-message: The nostr-swarm relay is alive and listening for connections.
    type: script

config:
  get:
    type: script
  set:
    type: script

volumes:
  main:
    type: data

interfaces:
  websocket:
    name: WebSocket Interface
    description: Nostr relay WebSocket interface for clients
    tor-config:
      port-mapping:
        80: "3000"
    lan-config:
      443:
        ssl: true
        internal: 3000
    ui: false
    protocols:
      - tcp
      - http

backup:
  create:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args: [duplicity, create, /mnt/backup, /data]
    mounts:
      BACKUP: /mnt/backup
      main: /data
  restore:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args: [duplicity, restore, /mnt/backup, /data]
    mounts:
      BACKUP: /mnt/backup
      main: /data

migrations:
  from:
    "*":
      type: script
      args: ["from"]
  to:
    "*":
      type: script
      args: ["to"]

alerts: {}
dependencies: {}
