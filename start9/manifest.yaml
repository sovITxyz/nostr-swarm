id: nostr-swarm
title: "nostr-swarm"
version: 0.2.0
release-notes: |
  * Multi-writer sync: join another relay's shared event store via the new
    "Bootstrap Key (Invite)" config field, and grant joining nodes write
    access via "Admit Writers" (saving config restarts the service, which
    performs the admission)
  * New copyable properties: "Relay Invite" and "Local Writer Key"
  * Behavior change: protected events (NIP-70) are now rejected — a
    replicated relay cannot honor "do not propagate"
  * Existing installs upgrade with zero action and keep their event store
license: MIT
wrapper-repo: "https://github.com/sovITxyz/nostr-swarm"
upstream-repo: "https://github.com/sovITxyz/nostr-swarm"
support-site: "https://github.com/sovITxyz/nostr-swarm/issues"
marketing-site: "https://github.com/sovITxyz/nostr-swarm"
build: ["make"]
description:
  short: A fully peer-to-peer Nostr relay that syncs events over Hyperswarm.
  long: |
    nostr-swarm is a Nostr relay where every instance is a peer, not a server.
    Relay nodes that share one event store (one node founds it; others join
    with its invite) replicate over encrypted P2P connections, and Autobase
    linearizes all writes into a deterministic view every peer converges on.
    Writers are admitted by existing operators; non-writers serve full reads.
    Includes Web of Trust filtering and light client support.

assets:
  license: LICENSE
  icon: icon.png
  instructions: instructions.md

main:
  type: docker
  image: main
  entrypoint: "docker_entrypoint.sh"
  args: []
  mounts:
    main: /data

hardware-requirements:
  arch:
    - x86_64
    - aarch64

health-checks:
  main:
    name: WebSocket Server
    success-message: The nostr-swarm relay is alive and listening for connections.
    type: script

config:
  get:
    type: script
  set:
    type: script

volumes:
  main:
    type: data

interfaces:
  websocket:
    name: WebSocket Interface
    description: Nostr relay WebSocket interface for clients
    tor-config:
      port-mapping:
        80: "3000"
    lan-config:
      443:
        ssl: true
        internal: 3000
    ui: false
    protocols:
      - tcp
      - http

backup:
  create:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args: [duplicity, create, /mnt/backup, /data]
    mounts:
      BACKUP: /mnt/backup
      main: /data
  restore:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args: [duplicity, restore, /mnt/backup, /data]
    mounts:
      BACKUP: /mnt/backup
      main: /data

migrations:
  from:
    "*":
      type: script
      args: ["from"]
  to:
    "*":
      type: script
      args: ["to"]

alerts: {}
dependencies: {}
