# nostr-swarm public deployment -- TLS termination for BOTH WebSocket endpoints
# the Primal UI needs. Install as e.g. /etc/nginx/sites-available/nostr-swarm.conf
# and symlink into sites-enabled/, then `nginx -t && systemctl reload nginx`.
#
#   relay.example.com  ->  ws://127.0.0.1:3000   (Nostr NIP-01 relay)
#   cache.example.com  ->  ws://127.0.0.1:8801   (Primal cache shim)
#
# MIXED CONTENT: a browser that loaded the UI over https:// may ONLY open
# wss:// sockets. The Primal UI dials TWO kinds of socket -- the cache shim
# (PRIMAL_CACHE_URL) AND every priority relay (PRIMAL_PRIORITY_RELAYS) -- so
# BOTH server blocks below are required. Terminating TLS on only one of them
# leaves the other as ws:// and the browser blocks it.
#
# The UI bakes these URLs in at BUILD time (Vite), so after DNS + certs exist
# you must REBUILD the UI against the public wss:// URLs:
#   primal-web-app/.env:
#     PRIMAL_CACHE_URL       = "wss://cache.example.com"
#     PRIMAL_PRIORITY_RELAYS = "wss://relay.example.com"
#   npm run build   # (vite build) -- a rebuild is mandatory; env is compiled in
# and start the shim so the relay it advertises to browsers is the wss one:
#   SHIM_PUBLIC_RELAY_URL=wss://relay.example.com   (advertised via get_default_relays)

# Reusable Upgrade->Connection mapping for WebSocket proxying.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- Nostr relay (NIP-01) ---------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name relay.example.com;

    ssl_certificate     /etc/letsencrypt/live/relay.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relay.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # keep idle NIP-01 subscriptions alive
        proxy_send_timeout 3600s;
    }
}

# --- Primal cache shim ------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cache.example.com;

    ssl_certificate     /etc/letsencrypt/live/cache.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cache.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8801;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# --- Redirect http -> https for both hostnames ------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name relay.example.com cache.example.com;
    return 301 https://$host$request_uri;
}
